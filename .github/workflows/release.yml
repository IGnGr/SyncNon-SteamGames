name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller --clean SyncNon-SteamGames.spec

    - name: Read Changelog
      id: changelog
      run: |
        # Extract the section for the current version (assumes version is in the tag)
        VERSION=${{ github.ref_name }}
        # Use awk or similar to parse the changelog (adjust if needed)
        BODY=$(awk "/## \[$VERSION\]/,/^## \[/ { if (!/^## \[/ || /^## \[$VERSION\]/) print; else exit }" CHANGELOG.md | sed '1d')  # Remove the header line
        echo "content<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: actions/create-release@v1
      id: create_release
      with:
        draft: false
        prerelease: false
        release_name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        body: |
          ${{ steps.changelog.outputs.content }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/SyncNon-SteamGames.exe
        asset_name: SyncNon-SteamGames.exe
        asset_content_type: application/octet-stream
