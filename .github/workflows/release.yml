name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate release tag
      shell: pwsh
      run: |
        $VERSION = $env:GITHUB_REF_NAME
        if ($VERSION -notmatch '^v\d+\.\d+\.\d+$') {
          throw "Release tags must use vX.Y.Z format, for example v1.4.0. Received: $VERSION"
        }

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller --clean SyncNon-SteamGames.spec

    - name: Read Changelog
      id: changelog
      shell: pwsh
      run: |
        $VERSION = $env:GITHUB_REF_NAME
        $escapedVersion = [regex]::Escape($VERSION)
        $content = Get-Content CHANGELOG.md
        $start = $false
        $bodyLines = @()
        foreach ($line in $content) {
            if ($line -match "^## \[$escapedVersion\]$") {
                $start = $true
                continue
            }
            if ($start -and $line -match "^## \[") {
                break
            }
            if ($start) {
                $bodyLines += $line
            }
        }
        if (-not $start) {
            throw "No matching CHANGELOG.md section was found for $VERSION. Add a heading like '## [$VERSION]'."
        }
        $BODY = $bodyLines -join "`n"
        if ([string]::IsNullOrWhiteSpace($BODY)) {
            throw "The CHANGELOG.md section for $VERSION is empty."
        }
        "content<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        $BODY | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Create Release
      uses: actions/create-release@v1
      id: create_release
      with:
        draft: false
        prerelease: false
        release_name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        body: |
          ${{ steps.changelog.outputs.content }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/SyncNon-SteamGames.exe
        asset_name: SyncNon-SteamGames.exe
        asset_content_type: application/octet-stream
