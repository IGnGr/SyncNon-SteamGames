name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Validate release tag
      shell: pwsh
      run: |
        $VERSION = $env:GITHUB_REF_NAME
        if ($VERSION -notmatch '^v\d+\.\d+\.\d+$') {
          throw "Release tags must use vX.Y.Z format, for example v1.4.0. Received: $VERSION"
        }

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller --clean SyncNon-SteamGames.spec

    - name: Read Changelog
      id: changelog
      shell: pwsh
      run: |
        $VERSION = $env:GITHUB_REF_NAME
        $escapedVersion = [regex]::Escape($VERSION)
        $content = Get-Content CHANGELOG.md
        $start = $false
        $bodyLines = @()
        foreach ($line in $content) {
            if ($line -match "^## \[$escapedVersion\]$") {
                $start = $true
                continue
            }
            if ($start -and $line -match "^## \[") {
                break
            }
            if ($start) {
                $bodyLines += $line
            }
        }
        if (-not $start) {
            throw "No matching CHANGELOG.md section was found for $VERSION. Add a heading like '## [$VERSION]'."
        }
        $BODY = $bodyLines -join "`n"
        if ([string]::IsNullOrWhiteSpace($BODY)) {
            throw "The CHANGELOG.md section for $VERSION is empty."
        }
        $BODY | Out-File -FilePath release_notes.md -Encoding utf8

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        draft: false
        prerelease: false
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        body_path: release_notes.md
        files: ./dist/SyncNon-SteamGames.exe
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
